<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <title>魔方可視化演示</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        .cube { display: inline-block; margin: 10px; }
        table { border-collapse: collapse; margin: 5px; }
        td { width: 30px; height: 30px; border: 1px solid black; }
        .W { background-color: white; }
        .Y { background-color: yellow; }
        .R { background-color: red; }
        .O { background-color: orange; }
        .G { background-color: green; }
        .B { background-color: blue; }
        button { margin: 5px; }
    </style>
</head>
<body>
    <h1>任意階魔方可視化演示</h1>
    <label for="size">魔方階數:</label>
    <input type="number" id="size" value="3" min="2" max="10">
    <button onclick="initCube()">初始化</button>
    <br>
    <div id="cubeContainer"></div>
    <br>
    <div>
        <button onclick="applyMove('R')">R</button>
        <button onclick="applyMove('R\'')">R'</button>
        <button onclick="applyMove('L')">L</button>
        <button onclick="applyMove('L\'')">L'</button>
        <button onclick="applyMove('U')">U</button>
        <button onclick="applyMove('U\'')">U'</button>
        <button onclick="applyMove('D')">D</button>
        <button onclick="applyMove('D\'')">D'</button>
        <button onclick="applyMove('F')">F</button>
        <button onclick="applyMove('F\'')">F'</button>
        <button onclick="applyMove('B')">B</button>
        <button onclick="applyMove('B\'')">B'</button>
    </div>
    <br>
    <button onclick="scramble()">隨機打亂</button>
    <button onclick="solveDemo()">演示解法</button>

    <script>
        let cube = null;
        let n = 3;

        class RubiksCube {
            constructor(size) {
                this.n = size;
                this.colors = { U: 'W', D: 'Y', F: 'R', B: 'O', L: 'G', R: 'B' };
                this.faces = {};
                for (let face of 'UDFBLR') {
                    this.faces[face] = Array(this.n).fill().map(() => Array(this.n).fill(this.colors[face]));
                }
            }

            rotateFaceClockwise(face) {
                let f = this.faces[face];
                let newF = Array(this.n).fill().map(() => Array(this.n));
                for (let i = 0; i < this.n; i++) {
                    for (let j = 0; j < this.n; j++) {
                        newF[j][this.n-1-i] = f[i][j];
                    }
                }
                this.faces[face] = newF;
            }

            rotateFaceCounterclockwise(face) {
                let f = this.faces[face];
                let newF = Array(this.n).fill().map(() => Array(this.n));
                for (let i = 0; i < this.n; i++) {
                    for (let j = 0; j < this.n; j++) {
                        newF[this.n-1-j][i] = f[i][j];
                    }
                }
                this.faces[face] = newF;
            }

            moveR(inverse = false) {
                if (inverse) this.rotateFaceCounterclockwise('R');
                else this.rotateFaceClockwise('R');
                let temp = this.faces.F.map(row => row[this.n-1]);
                if (inverse) {
                    this.faces.F.forEach((row, i) => row[this.n-1] = this.faces.D[i][this.n-1]);
                    this.faces.D.forEach((row, i) => row[this.n-1] = this.faces.B[this.n-1-i][0]);
                    this.faces.B.forEach((row, i) => row[0] = this.faces.U[this.n-1-i][this.n-1]);
                    this.faces.U.forEach((row, i) => row[this.n-1] = temp[i]);
                } else {
                    this.faces.F.forEach((row, i) => row[this.n-1] = this.faces.U[i][this.n-1]);
                    this.faces.U.forEach((row, i) => row[this.n-1] = this.faces.B[this.n-1-i][0]);
                    this.faces.B.forEach((row, i) => row[0] = this.faces.D[this.n-1-i][this.n-1]);
                    this.faces.D.forEach((row, i) => row[this.n-1] = temp[i]);
                }
            }

            moveL(inverse = false) {
                if (inverse) this.rotateFaceCounterclockwise('L');
                else this.rotateFaceClockwise('L');
                let temp = this.faces.F.map(row => row[0]);
                if (inverse) {
                    this.faces.F.forEach((row, i) => row[0] = this.faces.U[i][0]);
                    this.faces.U.forEach((row, i) => row[0] = this.faces.B[this.n-1-i][this.n-1]);
                    this.faces.B.forEach((row, i) => row[this.n-1] = this.faces.D[this.n-1-i][0]);
                    this.faces.D.forEach((row, i) => row[0] = temp[i]);
                } else {
                    this.faces.F.forEach((row, i) => row[0] = this.faces.D[i][0]);
                    this.faces.D.forEach((row, i) => row[0] = this.faces.B[this.n-1-i][this.n-1]);
                    this.faces.B.forEach((row, i) => row[this.n-1] = this.faces.U[this.n-1-i][0]);
                    this.faces.U.forEach((row, i) => row[0] = temp[i]);
                }
            }

            moveU(inverse = false) {
                if (inverse) this.rotateFaceCounterclockwise('U');
                else this.rotateFaceClockwise('U');
                let temp = this.faces.F[0].slice();
                if (inverse) {
                    this.faces.F[0] = this.faces.R[0].slice();
                    this.faces.R[0] = this.faces.B[0].slice();
                    this.faces.B[0] = this.faces.L[0].slice();
                    this.faces.L[0] = temp;
                } else {
                    this.faces.F[0] = this.faces.L[0].slice();
                    this.faces.L[0] = this.faces.B[0].slice();
                    this.faces.B[0] = this.faces.R[0].slice();
                    this.faces.R[0] = temp;
                }
            }

            moveD(inverse = false) {
                if (inverse) this.rotateFaceCounterclockwise('D');
                else this.rotateFaceClockwise('D');
                let temp = this.faces.F[this.n-1].slice();
                if (inverse) {
                    this.faces.F[this.n-1] = this.faces.R[this.n-1].slice();
                    this.faces.R[this.n-1] = this.faces.B[this.n-1].slice();
                    this.faces.B[this.n-1] = this.faces.L[this.n-1].slice();
                    this.faces.L[this.n-1] = temp;
                } else {
                    this.faces.F[this.n-1] = this.faces.L[this.n-1].slice();
                    this.faces.L[this.n-1] = this.faces.B[this.n-1].slice();
                    this.faces.B[this.n-1] = this.faces.R[this.n-1].slice();
                    this.faces.R[this.n-1] = temp;
                }
            }

            moveF(inverse = false) {
                if (inverse) this.rotateFaceCounterclockwise('F');
                else this.rotateFaceClockwise('F');
                let temp = this.faces.U[this.n-1].slice();
                if (inverse) {
                    this.faces.U[this.n-1] = this.faces.L.map(row => row[this.n-1]).reverse();
                    this.faces.L.forEach((row, i) => row[this.n-1] = this.faces.D[0][this.n-1-i]);
                    this.faces.D[0] = this.faces.R.map(row => row[0]).reverse();
                    this.faces.R.forEach((row, i) => row[0] = temp[i]);
                } else {
                    this.faces.U[this.n-1] = this.faces.R.map(row => row[0]);
                    this.faces.R.forEach((row, i) => row[0] = this.faces.D[0][this.n-1-i]);
                    this.faces.D[0] = this.faces.L.map(row => row[this.n-1]);
                    this.faces.L.forEach((row, i) => row[this.n-1] = temp[this.n-1-i]);
                }
            }

            moveB(inverse = false) {
                if (inverse) this.rotateFaceCounterclockwise('B');
                else this.rotateFaceClockwise('B');
                let temp = this.faces.U[0].slice();
                if (inverse) {
                    this.faces.U[0] = this.faces.R.map(row => row[this.n-1]);
                    this.faces.R.forEach((row, i) => row[this.n-1] = this.faces.D[this.n-1][this.n-1-i]);
                    this.faces.D[this.n-1] = this.faces.L.map(row => row[0]);
                    this.faces.L.forEach((row, i) => row[0] = temp[this.n-1-i]);
                } else {
                    this.faces.U[0] = this.faces.L.map(row => row[0]).reverse();
                    this.faces.L.forEach((row, i) => row[0] = this.faces.D[this.n-1][i]);
                    this.faces.D[this.n-1] = this.faces.R.map(row => row[this.n-1]).reverse();
                    this.faces.R.forEach((row, i) => row[this.n-1] = temp[this.n-1-i]);
                }
            }

            applyMove(move) {
                let inverse = move.includes("'");
                let face = move[0];
                if (face === 'R') this.moveR(inverse);
                else if (face === 'L') this.moveL(inverse);
                else if (face === 'U') this.moveU(inverse);
                else if (face === 'D') this.moveD(inverse);
                else if (face === 'F') this.moveF(inverse);
                else if (face === 'B') this.moveB(inverse);
            }
        }

        function initCube() {
            n = parseInt(document.getElementById('size').value);
            cube = new RubiksCube(n);
            drawCube();
        }

        function drawCube() {
            let container = document.getElementById('cubeContainer');
            container.innerHTML = '';
            let faces = ['F', 'B', 'L', 'R', 'U', 'D'];
            let names = ['前', '後', '左', '右', '上', '下'];
            for (let i = 0; i < faces.length; i++) {
                let div = document.createElement('div');
                div.className = 'cube';
                div.innerHTML = `<h3>${names[i]}</h3>`;
                let table = document.createElement('table');
                for (let r = 0; r < n; r++) {
                    let tr = document.createElement('tr');
                    for (let c = 0; c < n; c++) {
                        let td = document.createElement('td');
                        td.className = cube.faces[faces[i]][r][c];
                        tr.appendChild(td);
                    }
                    table.appendChild(tr);
                }
                div.appendChild(table);
                container.appendChild(div);
            }
        }

        function applyMove(move) {
            if (!cube) return;
            cube.applyMove(move);
            drawCube();
        }

        function scramble() {
            if (!cube) return;
            let moves = ['R', 'R\'', 'L', 'L\'', 'U', 'U\'', 'D', 'D\'', 'F', 'F\'', 'B', 'B\''];
            for (let i = 0; i < 20; i++) {
                let move = moves[Math.floor(Math.random() * moves.length)];
                cube.applyMove(move);
            }
            drawCube();
        }

        function solveDemo() {
            // Simple demo, just apply some moves
            let moves = ['R', 'U', 'R\'', 'U\''];
            let i = 0;
            let interval = setInterval(() => {
                if (i < moves.length) {
                    cube.applyMove(moves[i]);
                    drawCube();
                    i++;
                } else {
                    clearInterval(interval);
                }
            }, 500);
        }

        initCube();
    </script>
</body>
</html>
